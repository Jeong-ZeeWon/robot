name: Deploy Sioni to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare static site
        run: |
          mkdir -p dist
          cp index.html dist/
          cp style.css dist/
          cp motions.css dist/
          cp v4.css dist/
          cp responses.js dist/
          cp responses-extra.js dist/
          cp v4.js dist/
          cp app.js dist/
          cp persist.js dist/
          cp manifest.json dist/
          cp icon.svg dist/
          cp sw.js dist/
          touch dist/.nojekyll

      - name: Upload static files
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
